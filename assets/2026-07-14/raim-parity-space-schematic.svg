<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">RAIM residual and parity-space schematic</title>
  <desc id="desc">A conceptual redraw of the Brown baseline GPS RAIM flow from measurements through least-squares residuals and parity-space detection.</desc>
  <style>
    .box{fill:#eef4ff;stroke:#2457a6;stroke-width:2;rx:14}
    .fault{fill:#fff0f0;stroke:#b42318;stroke-width:2;rx:14}
    .text{font-family:Arial,"Noto Sans CJK SC",sans-serif;font-size:22px;fill:#1f2937}
    .small{font-family:Arial,"Noto Sans CJK SC",sans-serif;font-size:18px;fill:#374151}
    .arrow{stroke:#334155;stroke-width:3;fill:none;marker-end:url(#arrow)}
    .dash{stroke:#b42318;stroke-width:3;stroke-dasharray:9 8;fill:none;marker-end:url(#arrowRed)}
  </style>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 z" fill="#334155"/></marker>
    <marker id="arrowRed" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 z" fill="#b42318"/></marker>
  </defs>
  <rect x="20" y="20" width="1160" height="520" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="60" y="65" class="text" font-weight="700">RAIM 检测链（根据 Brown 1992 模型重绘，非原论文图）</text>
  <rect x="70" y="130" width="220" height="100" class="box"/>
  <text x="180" y="170" class="text" text-anchor="middle">观测</text>
  <text x="180" y="204" class="small" text-anchor="middle">y = Gx + v (+ f)</text>
  <rect x="360" y="130" width="220" height="100" class="box"/>
  <text x="470" y="170" class="text" text-anchor="middle">最小二乘解</text>
  <text x="470" y="204" class="small" text-anchor="middle">x̂=(GᵀWG)⁻¹GᵀWy</text>
  <rect x="650" y="90" width="220" height="100" class="box"/>
  <text x="760" y="130" class="text" text-anchor="middle">残差空间</text>
  <text x="760" y="164" class="small" text-anchor="middle">r = y − Gx̂</text>
  <rect x="650" y="250" width="220" height="100" class="box"/>
  <text x="760" y="290" class="text" text-anchor="middle">奇偶空间</text>
  <text x="760" y="324" class="small" text-anchor="middle">PᵀG = 0，p=PᵀW¹ᐟ²y</text>
  <rect x="940" y="170" width="180" height="100" class="fault"/>
  <text x="1030" y="210" class="text" text-anchor="middle">统计检验</text>
  <text x="1030" y="244" class="small" text-anchor="middle">T &gt; 门限？</text>
  <path d="M290 180 L360 180" class="arrow"/>
  <path d="M580 165 L650 140" class="arrow"/>
  <path d="M580 195 L650 300" class="arrow"/>
  <path d="M870 140 L940 205" class="arrow"/>
  <path d="M870 300 L940 235" class="arrow"/>
  <path d="M180 230 C220 360, 420 410, 650 300" class="dash"/>
  <text x="270" y="390" class="small" fill="#b42318">单星故障 f 投影到检测空间</text>
  <text x="940" y="315" class="small">输出：报警、排除卫星、保护水平</text>
</svg>
